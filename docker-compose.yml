#####################################################################################
# Fiscalismia-Loadbalancer HAProxy as central HTTPS Ingress for hcloud infrastructure
#####################################################################################

services:
  haproxy:
    container_name: haproxy
    image: ghcr.io/fiscalismia/fiscalismia-loadbalancer:latest
    pull_policy: always
    restart: always
    # Network mode: host to access both private network interfaces and the public network interface
    # - HAProxy sees real client IPs at Layer 4 before it even touches TLS for rate limiting (track-sc0 src, src_conn_rate)
    # - locked down nftables input/output/forward chains apply without any Podman-injected NAT rules undermining them
    # In production on Hetzner VPS, this allows HAProxy to bind to:
    # - Public IP for incoming HTTPS traffic
    # - Private IPs (172.20.1.3 and 172.24.1.3) for backend routing
    network_mode: host
    environment:
      - TZ=Europe/Berlin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # to avoid spamming the access logs only run a simple tcp healthcheck
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8405/health" ]
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 5
    # Container Resource Usage
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.5'
        reservations:
          memory: 1024M
          cpus: '1.0'
    # Read-only root filesystem (best practice)
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
      - /run:noexec,nosuid,size=64m
    # Capabilities (minimal required permissions)
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required to bind to ports < 1024
    security_opt:
      - no-new-privileges:true